spring.application.name=HangmanSpringBoot
server.port=8080
# Disable template cache during development so edits are picked up without restart
spring.thymeleaf.cache=false
# Show detailed error information in the browser (development only)
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
# Logging
logging.level.ph.edu.dlsu.lbycpob.hangman=DEBUG