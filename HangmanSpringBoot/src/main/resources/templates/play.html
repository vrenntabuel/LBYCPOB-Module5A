<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">

    <!-- ── Status message ── -->
    <div th:if="${state.message != null and !state.message.isEmpty()}"
         th:classappend="${state.gameOver ? (state.won ? ' alert-success' : ' alert-danger') : ' alert-info'}"
         class="alert alert-dismissible fade show mb-4"
         role="alert">
        <strong th:text="${state.message}">Message</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- ── Main game area ── -->
    <div class="row g-4">

        <!-- LEFT: ASCII art -->
        <div class="col-md-5">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-dark text-white text-center">
                    <span class="fw-semibold">
                        Guesses remaining:
                        <span class="badge"
                              th:classappend="${state.guessesRemaining <= 2 ? ' bg-danger' :
                                               (state.guessesRemaining <= 4 ? ' bg-warning text-dark' :
                                                ' bg-success')}"
                              th:text="${state.guessesRemaining}">8</span>
                        / 8
                    </span>
                </div>
                <div class="card-body d-flex align-items-center justify-content-center p-3">
                    <pre class="hangman-art mb-0"
                         th:text="${hangmanArt}">art</pre>
                </div>
            </div>
        </div>

        <!-- RIGHT: Game info -->
        <div class="col-md-7">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-dark text-white">
                    <span class="fw-semibold">
                        Word length:
                        <span class="badge bg-secondary"
                              th:text="${state.secretWord.length()}">?</span>
                        letter(s)
                    </span>
                </div>
                <div class="card-body">

                    <!-- Hint display -->
                    <div class="hint-display text-center my-4"
                         th:text="${displayHint}">
                        - - - -
                    </div>

                    <!-- Guessed letters -->
                    <!--
                        FIX 1: ch comes from toCharArray() so it is a boxed Character.
                        String.indexOf(Character) is ambiguous in SpEL because indexOf has
                        overloads for int and String.
                        Solution: ch.toString() gives a one-character String, then
                        state.secretWord.contains(ch.toString()) resolves unambiguously.
                    -->
                    <div class="mb-3 text-center">
                        <span class="text-muted small fw-semibold me-2">
                            Guessed letters:
                        </span>
                        <span th:if="${state.guessedLetters.isEmpty()}"
                              class="text-muted small">
                            None yet
                        </span>
                        <span th:each="ch : ${state.guessedLetters.toCharArray()}"
                              th:text="${ch}"
                              th:classappend="${state.secretWord.contains(ch.toString()) ?
                                              ' bg-success' : ' bg-danger'}"
                              class="badge me-1">A</span>
                    </div>

                    <!-- ── Active game: on-screen keyboard ── -->
                    <div th:unless="${state.gameOver}">
                        <hr>
                        <p class="text-center text-muted small mb-2">
                            Click a letter to guess:
                        </p>

                        <!-- Hidden form; submitted via JS when a button is clicked -->
                        <form id="guessForm"
                              th:action="@{/game/guess}"
                              method="post">
                            <input type="hidden" name="letter" id="letterValue">
                        </form>

                        <!--
                            FIX 2: ch here comes from List<Character> alphabet.
                            Same ambiguity applies to indexOf(ch).
                            Solution: use ch.toString() everywhere ch is used in
                            a String method call so SpEL resolves the overload correctly.
                        -->
                        <div class="keyboard-grid">
                            <div th:each="ch : ${alphabet}"
                                 style="display:inline-block;">
                                <button type="button"
                                        th:text="${ch}"
                                        th:attr="data-letter=${ch}"
                                        th:disabled="${state.guessedLetters.contains(ch.toString())}"
                                        th:classappend="${state.guessedLetters.contains(ch.toString()) ?
                                                         (state.secretWord.contains(ch.toString()) ?
                                                          ' btn-success' : ' btn-danger') :
                                                          ' btn-outline-dark'}"
                                        class="btn btn-sm fw-bold keyboard-btn"
                                        onclick="submitGuess(this.dataset.letter)">
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- ── Game over panel ── -->
                    <div th:if="${state.gameOver}" class="mt-3">
                        <hr>
                        <div class="text-center">

                            <!-- Win banner -->
                            <div th:if="${state.won}"
                                 class="alert alert-success d-inline-block px-4">
                                <h4 class="mb-1">You Won!</h4>
                                <p class="mb-0 small">
                                    The word was
                                    <strong th:text="${state.secretWord}">WORD</strong>.
                                </p>
                            </div>

                            <!-- Loss banner -->
                            <div th:unless="${state.won}"
                                 class="alert alert-danger d-inline-block px-4">
                                <h4 class="mb-1">Game Over</h4>
                                <p class="mb-0 small">
                                    The word was
                                    <strong th:text="${state.secretWord}">WORD</strong>.
                                </p>
                            </div>

                            <div class="d-flex gap-3 justify-content-center mt-3">
                                <form th:action="@{/game/again}" method="post">
                                    <button type="submit"
                                            class="btn btn-dark btn-lg fs-6">
                                        Play Again
                                    </button>
                                </form>
                                <a th:href="@{/game/stats}"
                                   class="btn btn-outline-secondary btn-lg fs-6">
                                    View Statistics
                                </a>
                            </div>
                        </div>
                    </div>

                </div><!-- /card-body -->
            </div><!-- /card -->
        </div><!-- /col -->

    </div><!-- /row -->

    <!-- Session mini-stats footer -->
    <div class="row mt-4">
        <div class="col text-center text-muted small">
            Session :
            Played: <strong th:text="${state.statistics.gamesPlayed()}">0</strong>
            &nbsp;|&nbsp;
            Won: <strong th:text="${state.statistics.gamesWon()}">0</strong>
            &nbsp;|&nbsp;
            Win%:
            <strong th:text="${state.statistics.formattedWinPercentage()}">0.00%</strong>
        </div>
    </div>

</div><!-- /container -->

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>

<script>
    function submitGuess(letter) {
        document.getElementById('letterValue').value = letter;
        document.getElementById('guessForm').submit();
    }
</script>

</body>
</html>
