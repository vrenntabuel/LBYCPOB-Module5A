<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<!-- ================================================================
     FRAGMENT: head
     Usage: <head th:replace="~{fragments/layout :: head}"></head>
     ================================================================ -->
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hangman</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link th:href="@{/css/hangman.css}" rel="stylesheet">
</head>

<!-- ================================================================
     FRAGMENT: navbar
     ================================================================ -->
<nav th:fragment="navbar"
     class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" th:href="@{/}">
            LBYCPOB Hangman by Juan Dela Cruz
        </a>
        <div class="d-flex gap-2">
            <a th:href="@{/game/stats}"
               class="btn btn-outline-warning btn-sm">
                View Stats
            </a>
            <a th:href="@{/game/reset}"
               class="btn btn-outline-light btn-sm">
                Reset
            </a>
        </div>
    </div>
</nav>

<!-- ================================================================
     FRAGMENT: footer
     ================================================================ -->
<footer th:fragment="footer"
        class="text-center text-muted py-4 mt-5 border-top bg-light small">
    <div class="container">
        <p class="mb-0">
            Hangman &copy; 2026
        </p>
    </div>
</footer>

<!-- ================================================================
     FRAGMENT: scripts
     ================================================================ -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</div>

</html>
