spring.application.name=ProfileManagerSpringBoot

# Transaction Pooler Connection
spring.datasource.url=${SUPABASE_DB_URL:}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Multipart upload limits (avatar file uploads)
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=1MB

# ----------------------------------------------------------------
# Supabase Storage -- avatar bucket
# ----------------------------------------------------------------
# Project Settings -> API -> Project URL
app.supabase.url=${SUPABASE_URL}

# Project Settings -> API Keys -> Publishable and secret API keys tab
# NEW: Secret Key (sb_secret_...) replaces the legacy service_role key
# This key is for server-side use only and bypasses RLS.
# NEVER expose this to the browser or commit to version control.
app.supabase.secret-key=${SUPABASE_SECRET_KEY}

# Must already exist as a bucket in Supabase Storage, and be set
# to Public (Storage -> your bucket -> ... -> Make public) so the
# returned URLs are directly viewable without a signed-URL step.
app.supabase.avatar-bucket=${SUPABASE_AVATAR_BUCKET:avatars}


# CRITICAL: Disable Hibernate's transaction management
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.connection.autocommit=false


# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# IMPORTANT: Tell Hibernate not to call commit/rollback
spring.jpa.properties.hibernate.transaction.jta.platform=org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# Server
server.port=${PORT:8080}
spring.thymeleaf.cache=false